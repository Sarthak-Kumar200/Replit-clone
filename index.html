<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Replit - clone</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <nav>
    <div class="logo">
      <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/New_Replit_Logo.svg" width="25">
    </div>
    <span class="replit">replit</span>
    <ul class="nav-links">
      <li>Products</li>
      <li>For work</li>
      <li>Resources</li>
      <li>Pricing</li>
    </ul>
  </nav>
  <nav class="nav2">
    <ul>
      <li>Contact sales</li>
      <li>Log in</li>
      <button class="createaccountbutton">
        <li>Create account</li>
      </button>
    </ul>
  </nav>
  <p class="What_will_you_build"> What will you build?</p>
  <p class="Turnideasintoappsinminutes—nocodingneeded">Turn ideas into apps in minutes — no coding needed</p>
  <textarea class="inputbox" type="text" placeholder="  
  Make a software application that...">
</textarea>
  <button class="startbutton">Start</button>
  <div class="appbox">
    <p class="paraapp">App</p>
  </div>


  <div class="design">
    <p class="paradesign">Design</p>
  </div>
  <div class="plusiconparent">
    <img src="plus.png" alt="img" width="10" class="plusicon">
  </div>
  <div>
    <h2 class="startwithanidea">Start with an idea</h2>
  </div>
  <div class="ideabuttons">
    <button class="aiapp">Ai app</button>
    <button class="websitebtn">Website</button>
    <button class="buisnessapp">Buisness app</button>
    <button class="personalsoftware">Personal Software</button>
  </div>
  <div class="bigboxes">
    <div class="box1"><img src="image.png" alt="can't load image"></div>
    <div class="box2"><img src="image2.avif" alt="can't load image"></div>
    <div class="box3"><img src="image3.avif" alt="can't load image"></div>
  </div>
  <h3 class="aichat">AI Chat</h3>
  <h3 class="brainstromingbuddy">Brainstorming Buddy</h3>
  <h3 class="reciptgenerator">Receipt generator</h3>
  <button class="aiapps1">Ai apps</button>
  <button class="aiapps2">Ai apps</button>
  <button class="aiapps3">Ai apps</button>
</body>

</html>
